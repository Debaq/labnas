name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extraer version del tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust (musl estatico)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Instalar musl tools y deps
        run: sudo apt-get update && sudo apt-get install -y musl-tools pkg-config perl make

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-musl-cargo-${{ hashFiles('backend/Cargo.lock') }}

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npx vite build --emptyOutDir

      - name: Build backend (release, estatico)
        working-directory: backend
        env:
          OPENSSL_STATIC: "1"
        run: cargo build --release --target x86_64-unknown-linux-musl --features vendored-ssl

      - name: Empaquetar release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE_DIR="labnas"
          mkdir -p "$RELEASE_DIR"

          # Binario estatico
          cp backend/target/x86_64-unknown-linux-musl/release/labnas-backend "$RELEASE_DIR/"

          # Frontend
          cp -r frontend/dist "$RELEASE_DIR/dist"

          # Scripts y config
          cp labnas.sh "$RELEASE_DIR/"
          cp setup-tailscale.sh "$RELEASE_DIR/" 2>/dev/null || true
          cp VERSION "$RELEASE_DIR/"

          # Tarball
          TARBALL="labnas-v${VERSION}-linux-x86_64.tar.gz"
          tar czf "$TARBALL" "$RELEASE_DIR"
          echo "tarball=$TARBALL" >> "$GITHUB_ENV"

      - name: Subir asset al release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          # Si el release ya existe, solo subir el asset. Si no, crearlo.
          if gh release view "$TAG" &>/dev/null; then
            gh release upload "$TAG" "${{ env.tarball }}" --clobber
          else
            gh release create "$TAG" "${{ env.tarball }}" \
              --title "LabNAS ${{ steps.version.outputs.version }}" \
              --generate-notes
          fi
